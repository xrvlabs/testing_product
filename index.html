<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="theme-color" id="status-bar-color" content="#f8fafc">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>INVOYR</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="INVOYR">
    <link rel="manifest" href="manifest.json">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quantico:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    screens: { 'xs': '380px' },
                    fontFamily: {
                        'sans': ['Quantico', 'sans-serif'],
                        'signature': ['Dancing Script', 'cursive']
                    },
                    animation: {
                        'slide-up': 'slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards',
                        'float': 'float 6s ease-in-out infinite',
                        'float-delayed': 'float 6s ease-in-out 3s infinite',
                        'fade-in': 'fadeIn 0.8s ease-out forwards',
                        'pulse-fast': 'pulse 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'confetti-rain': 'confettiRain 2.5s ease-out forwards',
                        'shake': 'shake 0.4s ease-in-out'
                    },
                    keyframes: {
                        slideUp: { '0%': { transform: 'translateY(100%)', opacity: '0' }, '100%': { transform: 'translateY(0)', opacity: '1' } },
                        float: { '0%, 100%': { transform: 'translateY(0px)' }, '50%': { transform: 'translateY(-20px)' } },
                        fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } },
                        confettiRain: {
                            '0%': { transform: 'translateY(-10vh) rotate(0deg)', opacity: 1 },
                            '100%': { transform: 'translateY(100vh) rotate(720deg)', opacity: 0 }
                        },
                        shake: {
                            '0%, 100%': { transform: 'translateX(0)' },
                            '20%, 60%': { transform: 'translateX(-5px)' },
                            '40%, 80%': { transform: 'translateX(5px)' }
                        }
                    }
                }
            }
        }
        if (!localStorage.getItem('inv_theme')) localStorage.setItem('inv_theme', 'light');
        if (localStorage.getItem('inv_theme') === 'dark') {
    document.documentElement.classList.add('dark');
    // Set initial status bar to dark
    document.addEventListener('DOMContentLoaded', () => {
        const statusBar = document.getElementById('status-bar-color');
        if (statusBar) statusBar.setAttribute("content", "#0f172a");
    });
}

        // Security & UX Rules Setup
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('keydown', e => { if (e.key.match(/^F([1-9]|1[0-2])$/)) { e.preventDefault(); } });
        document.addEventListener('wheel', e => { if (e.ctrlKey) { e.preventDefault(); } }, { passive: false });
        document.addEventListener('touchstart', e => { if (e.touches.length > 1) { e.preventDefault(); } }, { passive: false });
    </script>

    <style>
        :root { --safe-bottom: env(safe-area-inset-bottom, 0px); --brand-color: #6a1b9a; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; max-width: 100%; overflow-x: hidden; overscroll-behavior-x: none; }
        body { font-family: 'Quantico', sans-serif; -webkit-tap-highlight-color: transparent; background-color: #f8fafc; touch-action: manipulation; -webkit-user-select: none; user-select: none; }
        input, textarea, select { -webkit-user-select: auto; user-select: auto; }
        
        .dark body { background-color: #0f172a; }
        body * { transition: background-color 0.25s ease, border-color 0.25s ease, color 0.25s ease; }
        button, h1, h2, h3, h4, h5, h6 { text-transform: uppercase !important; }

        .glass-card { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); border: 1px solid #e2e8f0; border-radius: 5px; }
        .dark .glass-card { background: rgba(30, 41, 59, 0.85); border-color: #334155; }
        .app-container { height: 100vh; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; width: 100%; max-width: 100%; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .field-input { padding: 12px 14px; border: 1px solid #cbd5e1; outline: none; border-radius: 5px; font-size: 14px; width: 100%; background: #ffffff; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        .field-input:focus { border-color: #6a1b9a; box-shadow: 0 0 0 2px rgba(106,27,154,0.1); }
        .dark .field-input { border-color: #334155; background: #1e293b; color: #f1f5f9; box-shadow: 0 1px 2px rgba(0,0,0,0.2); }
        .dark .field-input:focus { border-color: #a855f7; box-shadow: 0 0 0 2px rgba(168,85,247,0.1); }

        .btn-primary { padding: 12px 16px; font-weight: 700; border-radius: 5px; font-size: 14px; transition: all 0.2s; }
        .btn-primary:active { transform: translateY(2px); }
        .stat-card { padding: 12px; border: 1px solid #e2e8f0; border-radius: 5px; }
        .dark .stat-card { border-color: #334155; }

        #main-content { padding: 10px; padding-bottom: 80px; width: 100%; overflow-x: hidden; }
        #bottom-nav { padding-bottom: calc(var(--safe-bottom) + 4px); border-top: 1px solid #e2e8f0; height: 60px; width: 100%; }
        .dark #bottom-nav { border-top-color: #334155; }

        @keyframes shimmerAnim { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
        .shimmer-box { background: linear-gradient(90deg, #e2e8f0 25%, #cbd5e1 50%, #e2e8f0 75%); background-size: 200% 100%; animation: shimmerAnim 1.5s infinite linear; border-radius: 5px; }
        .dark .shimmer-box { background: linear-gradient(90deg, #334155 25%, #475569 50%, #334155 75%); background-size: 200% 100%; }

        .bottom-sheet-overlay { transition: opacity 0.3s ease; }
        .bottom-sheet-content { transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1); border-radius: 5px 5px 0 0; }
        .pb-safe { padding-bottom: calc(env(safe-area-inset-bottom, 0px) + 20px); }

        .invoice-wrapper { width: 100%; display: flex; justify-content: center; position: relative; overflow: hidden; }
        .invoice-card { width: 800px; min-height: 1131px; flex-shrink: 0; background: white !important; color: black !important; padding: 40px 20px; box-sizing: border-box; box-shadow: 0 0 20px rgba(0,0,0,0.1); border: 1px solid #ccc; transform-origin: top center; margin: 0 auto; }
        .invoice-card * { transition: none !important; border-color: #222 !important; color: black !important; }
        .header-section { display: flex; justify-content: space-between; align-items: flex-start; border-bottom: 4px solid var(--brand-color) !important; padding-bottom: 15px; margin-bottom: 10px; }
        .owner-text { color: var(--brand-color) !important; font-size: 32px; margin: 0; font-weight: 700; text-transform: uppercase; }
        .inv-label-middle { text-align: center; font-size: 24px; font-weight: 700; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 20px; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; width: 100%; margin-bottom: 20px; }
        .box-left, .box-right { border: 1.5px solid #222; padding: 15px; }
        .box-left { border-right: none; }
        .label-tag { font-size: 11px; font-weight: bold; text-transform: uppercase; background: #eee !important; padding: 2px 8px; display: inline-block; margin-bottom: 8px; border: 1px solid #ccc; }
        .table-box { border: 1.5px solid #222; width: 100%; border-collapse: collapse; margin-bottom: 20px; text-transform: uppercase; }
        .table-box th { background: #f0f0f0 !important; border-bottom: 1.5px solid #222; padding: 12px 10px; font-size: 12px; }
        .table-box td { padding: 15px 10px; border-bottom: 1px solid #eee; font-size: 14px; font-weight: 400; line-height: 1.4; }
        .table-box th:not(:last-child), .table-box td:not(:last-child) { border-right: 1px solid #ddd; }
        .footer-grid { display: grid; grid-template-columns: 1fr 1.4fr; gap: 0; }
        .terms-box { border: 1.5px solid #222; border-right: none; padding: 15px; font-size: 10px; line-height: 1.8; }
        .totals-box { border: 1.5px solid #222; padding: 15px; background: #fcfcfc !important; }
        .total-row { display: flex; justify-content: space-between; padding: 5px 0; font-size: 14px; border-bottom: 1px dashed #ccc; }
        .highlight-total { margin-top: 5px; font-weight: 700; font-size: 20px; color: var(--brand-color) !important; border-bottom: none !important; }

        @media print {
            html, body { width: auto; max-width: none; overflow: visible; }
            body, .app-container, #view-main, #main-content { height: auto !important; overflow: visible !important; display: block !important; background: white !important; padding: 0 !important; }
            #main-header, #bottom-nav, #login-screen, #email-bs-overlay, #confirm-bs-overlay, #info-bs-overlay, .no-print { display: none !important; }
            .invoice-wrapper { overflow: visible; padding: 0; display: block; height: auto !important; width: 100%; margin-left: 0; }
            .invoice-card { box-shadow: none; border: none; margin: 0; width: 100%; padding: 0; min-height: auto; transform: none !important; }

            body.print-bs-mode #view-main, body.print-bs-mode #bottom-nav { display: none !important; }
            body.print-bs-mode #bs-overlay { display: block !important; opacity: 1 !important; position: static !important; background: white !important; }
            body.print-bs-mode #bs-content { box-shadow: none !important; transform: none !important; height: auto !important; position: static !important; }
            
            body.print-bs-mode #bs-drag-handle, 
            body.print-bs-mode #bs-header { display: none !important; }
            body.print-bs-mode #bs-content .flex-1 { padding: 0 !important; background: white !important; overflow: visible !important; }
        }
    </style>
</head>

<script>
    window.addEventListener("load", () => {
        lucide.createIcons();
        const splash = document.getElementById('splash-screen');
        if (splash) {
            setTimeout(() => {
                splash.style.opacity = '0';
                splash.style.transform = 'scale(1.05)';
                setTimeout(() => { splash.remove(); }, 1000);
            }, 2500);
        }
        
        // Initialize 3D Card Physics
        setup3DCard();
    });

    // Interactive 3D Physics Logic for Developer Card
    function setup3DCard() {
        const container = document.getElementById('dev-card-container');
        const inner = document.getElementById('dev-card-inner');
        if (!container || !inner) return;

        let isDragging = false;
        let startX, startY;
        let lastX, lastTime;
        let velocityX = 0;

        let rotY = 0, rotX = 0;           // Current visible rotation
        let targetRotY = 0, targetRotX = 0; // The rotation we are easing towards
        let baseRotY = 0;                   // The snap point (0, 180, 360, etc.)

        container.addEventListener('pointerdown', (e) => {
            isDragging = true;
            startX = e.clientX;
            startY = e.clientY;
            lastX = startX;
            lastTime = performance.now();
            velocityX = 0;
            container.setPointerCapture(e.pointerId);
        });

        container.addEventListener('pointermove', (e) => {
            if (!isDragging) return;
            
            const deltaX = e.clientX - startX;
            const deltaY = e.clientY - startY;

            // Calculate swipe velocity
            const now = performance.now();
            const dt = now - lastTime;
            if (dt > 0) {
                velocityX = (e.clientX - lastX) / dt;
            }
            lastX = e.clientX;
            lastTime = now;

            // Update rotation targets based on finger drag
            targetRotY = baseRotY + (deltaX * 0.4); 
            targetRotX = -(deltaY * 0.15); // Slight tilt up/down

            // Clamp vertical tilt to prevent flipping head-over-heels
            targetRotX = Math.max(-15, Math.min(15, targetRotX));
        });

        const release = (e) => {
            if (!isDragging) return;
            isDragging = false;

            const deltaX = e.clientX - startX;
            const deltaY = e.clientY - startY;

            // If it was just a quick tap without much movement, flip it completely
            if (Math.abs(deltaX) < 5 && Math.abs(deltaY) < 5) {
                baseRotY += 180;
            } else {
                // Otherwise, evaluate swipe velocity and distance to decide if it should snap forward or back
                const diff = targetRotY - baseRotY;
                const velThreshold = 0.5; // Swipe speed required to trigger flip
                const distThreshold = 60; // Degrees turned required to trigger flip

                if (Math.abs(diff) > distThreshold || Math.abs(velocityX) > velThreshold) {
                    if (diff > 0 || velocityX > velThreshold) {
                        baseRotY += 180;
                    } else {
                        baseRotY -= 180;
                    }
                }
            }

            // Snap back to vertical orientation and closest face
            targetRotY = baseRotY;
            targetRotX = 0; 
        };

        container.addEventListener('pointerup', release);
        container.addEventListener('pointercancel', release);

        // Smooth physics render loop (Lerp)
        function render() {
            rotY += (targetRotY - rotY) * 0.1;
            rotX += (targetRotX - rotX) * 0.1;
            inner.style.transform = `rotateX(${rotX}deg) rotateY(${rotY}deg)`;
            requestAnimationFrame(render);
        }
        render();
    }
</script>

        let isDragging = false;

        const handleStart = (e) => {
            isDragging = true;
            startX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
            thumb.style.transition = 'none';
            fill.style.transition = 'none';

        const handleMove = (e) => {
    if (!isDragging) return;
    e.preventDefault();
    const currentX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
    let diff = currentX - startX;
    const maxTrack = track.clientWidth - thumb.clientWidth - 8;

    if (diff < 0) diff = 0;
    if (diff > maxTrack) diff = maxTrack;

    thumb.style.transform = `translateX(${diff}px)`;
    fill.style.width = `calc(${diff}px + 1.5rem)`;
    text.style.opacity = 1 - (diff / maxTrack);

    if (diff >= maxTrack * 0.90) {
        isDragging = false;
        thumb.style.transform = `translateX(${maxTrack}px)`;
        
        // --- ADDED HAPTIC FEEDBACK ---
        // Checks if the browser/device supports vibration, then triggers a 50ms pulse
        if (navigator.vibrate) {

        }
        // -----------------------------

        setTimeout(() => {
            const actionToExecute = window.pendingConfirmAction;
            window.closeConfirmSheet();
            if(actionToExecute) actionToExecute();
        }, 150);
    }
};

        const handleEnd = () => {
            if (!isDragging) return;
            isDragging = false;
            thumb.style.transition = 'transform 0.3s cubic-bezier(0.16, 1, 0.3, 1)';
            fill.style.transition = 'width 0.3s cubic-bezier(0.16, 1, 0.3, 1)';
            text.style.transition = 'opacity 0.3s ease';
            thumb.style.transform = `translateX(0px)`;
            fill.style.width = '0px';
            text.style.opacity = '1';
        };

        thumb.addEventListener('touchstart', handleStart, {passive: false});
        document.addEventListener('touchmove', handleMove, {passive: false});
        document.addEventListener('touchend', handleEnd);

        thumb.addEventListener('mousedown', handleStart);
        document.addEventListener('mousemove', handleMove);
        document.addEventListener('mouseup', handleEnd);
    };

    setupSlider();

    window.openConfirmSheet = (title, msg, isDestructive, actionFn) => {
        window.pendingConfirmAction = actionFn;
        document.getElementById('confirm-title').innerText = title;
        document.getElementById('confirm-message').innerText = msg;

        const iconBox = document.getElementById('confirm-icon-box');
        const thumb = document.getElementById('slide-thumb');
        const fill = document.getElementById('slide-fill');

        if (isDestructive) {
            iconBox.className = "w-16 h-16 bg-red-100 dark:bg-red-900/30 text-red-600 rounded-[5px] flex items-center justify-center mb-4";
            iconBox.innerHTML = '<i data-lucide="alert-triangle" class="w-8 h-8"></i>';
            thumb.className = "absolute left-1 w-12 h-12 bg-white dark:bg-slate-700 rounded-[5px] shadow-md flex items-center justify-center z-10 cursor-grab text-red-500 active:cursor-grabbing transition-none border border-slate-200 dark:border-slate-600";
            fill.className = "absolute left-0 top-0 h-full bg-red-500/10 dark:bg-red-500/20 w-0 z-0 transition-none";
        } else {
            iconBox.className = "w-16 h-16 bg-purple-100 dark:bg-purple-900/30 text-purple-600 rounded-[5px] flex items-center justify-center mb-4";
            iconBox.innerHTML = '<i data-lucide="log-out" class="w-8 h-8"></i>';
            thumb.className = "absolute left-1 w-12 h-12 bg-white dark:bg-slate-700 rounded-[5px] shadow-md flex items-center justify-center z-10 cursor-grab text-purple-500 active:cursor-grabbing transition-none border border-slate-200 dark:border-slate-600";
            fill.className = "absolute left-0 top-0 h-full bg-purple-500/10 dark:bg-purple-500/20 w-0 z-0 transition-none";
        }
        lucide.createIcons();

        thumb.style.transition = 'none'; fill.style.transition = 'none';
        thumb.style.transform = `translateX(0px)`; fill.style.width = '0px';
        document.getElementById('slide-text').style.opacity = '1';

        const overlay = document.getElementById('confirm-bs-overlay');
        const content = document.getElementById('confirm-bs-content');
        overlay.classList.remove('opacity-0', 'pointer-events-none');
        overlay.classList.add('opacity-100');
        content.classList.remove('translate-y-full');
        content.classList.add('translate-y-0');

        history.pushState(null, null, location.href);
    };

    window.closeConfirmSheet = () => {
        window.pendingConfirmAction = null;
        const overlay = document.getElementById('confirm-bs-overlay');
        const content = document.getElementById('confirm-bs-content');
        if(!overlay.classList.contains('opacity-0')) {
             content.classList.remove('translate-y-0');
             content.classList.add('translate-y-full');
             overlay.classList.remove('opacity-100');
             overlay.classList.add('opacity-0');
             setTimeout(() => overlay.classList.add('pointer-events-none'), 300);
        }
    };

    window.viewInvoice = (id) => {
        window.viewingInvoiceId = id;
        localStorage.setItem('viewingInvoiceId', id);
        window.isInvoiceSimulatingLoad = true;
        window.switchTab('view-invoice');

        setTimeout(() => {
            window.isInvoiceSimulatingLoad = false;
            if(window.currentTab === 'view-invoice') window.switchTab('view-invoice');
        }, 1000);
    }

    window.editInvoice = (id) => {
        const inv = window.appData.invoices.find(i => i.id === id);
        if(!inv) return;
        window.isEditing = true;
        window.switchTab('add-invoice');

        setTimeout(() => {
            document.getElementById('iBiz').value = inv.client;
            document.getElementById('iDesc').value = inv.shift;
            document.getElementById('iInvNum').value = inv.id;
            document.getElementById('iStartDate').value = inv.startDate;
            document.getElementById('iEndDate').value = inv.endDate;
            document.getElementById('iVehName').value = inv.vehName;
            document.getElementById('iVehNum').value = inv.vehNum;
            document.getElementById('iKm').value = inv.km;
            document.getElementById('iDays').value = inv.days;
            document.getElementById('iOff').value = inv.sundays;
            document.getElementById('iRate').value = inv.rate;
            window.runInvoiceCalculation();
        }, 100);
    }

    window.deleteInvoice = (id) => {
        if(!window.currentUser) return;
        window.openConfirmSheet(
            "Delete Invoice",
            "Are you sure you want to delete this invoice? This action cannot be undone.",
            true,
            () => {
                set(ref(database, `INVOYR/XRV BUSINESS LITE 1/users/${window.currentUser.uid}/invoices/${id}`), null)
                    .then(() => window.switchTab('dashboard'))
                    .catch((err) => { alert("Failed to delete the invoice."); console.error(err); });
            }
        );
    }

    window.logoutUser = () => {
        window.openConfirmSheet(
            "Sign Out",
            "Are you sure you want to sign out of INVOYR?",
            false,
            () => {
                signOut(auth);
            }
        );
    };

    function generateInvoiceCardHTML(inv, profile) {
        const sunPrice = (inv.shift && inv.shift.includes("B SHIFT")) ? 1730 : 2115;
        const sunTotalAmount = inv.sundays * sunPrice;
        const subTotalText = inv.subTotal || (inv.rate + sunTotalAmount);

        const descParts = inv.shift ? inv.shift.split(' (') : ['PACKAGE', ')'];
        const pkgName = descParts[0];
        const shiftName = descParts[1] ? '(' + descParts[1] : '';
        const sDateStr = inv.startDate ? inv.startDate.split('-').reverse().join('/') : '';
        const eDateStr = inv.endDate ? inv.endDate.split('-').reverse().join('/') : '';
        const displayClient = inv.client || "CLIENT NAME";

        const logoSrc = localStorage.getItem('cached_logo') || 'logo.png';

        return `
        <div class="invoice-card" id="printable-invoice">
            <div class="header-section">
                <div class="logo-box"><img src="${logoSrc}" style="width: 190px; height: 130px; object-fit: contain;"></div>
                <div style="text-align: right;">
                    <h1 class="owner-text" id="vOwnerName">${profile.name || ''}</h1>
                    <p style="margin: 5px 0; color: #444; font-weight: 700;" id="vPhone">${profile.phone || ''}</p>
                    <div class="label-tag" id="vInvIdDisplay">${inv.id}</div>
                </div>
            </div>

            <div class="inv-label-middle">INVOICE</div>

            <div class="grid-2">
                <div class="box-left">
                    <span class="label-tag">Bill To</span><br>
                    <strong id="vBillToComp" style="font-size: 22px; color: var(--brand-color);">${displayClient}</strong>
                </div>
                <div class="box-right">
                    <span class="label-tag">Trip Details</span><br>
                    <strong id="vVehDisplay">${inv.vehName}</strong><br>
                    <span id="vVehNumDisplay">${inv.vehNum}</span><br>
          
                    <span id="vBillingDuration" style="font-weight: 700;">${sDateStr} TO ${eDateStr}</span>
                </div>
            </div>

            <table class="table-box">
                <thead>
                    <tr>
                        <th class="text-left" style="width: 45%;">Description</th>
                        <th class="text-center">KM</th>
                        <th class="text-center">DAYS</th>
                        <th class="text-center">SUNDAYS</th>
                        <th class="text-center">RATE</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td class="text-left" id="vDesc">${pkgName}<br><span style="font-size: 14px; font-weight: bold; color: #222;">${shiftName}</span></td>
                        <td class="text-center" id="vKm">${inv.km}</td>
                        <td class="text-center" id="vDays">${inv.days}</td>
                        <td class="text-center" id="vOff">${inv.sundays}</td>
                        <td class="text-center" id="vAmount">${Math.round(inv.rate).toLocaleString('en-IN')}</td>
                    </tr>
                </tbody>
            </table>

            <div class="footer-grid">
                <div class="terms-box">
                    <strong style="display:block; margin-bottom:5px;">TERMS & CONDITIONS:</strong>
                    <span style="display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">1. TOLL, PARKING & TAXES EXTRA AS ACTUALS.</span>
                    <span style="display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">2. DRIVER ALLOWANCE BY CLIENT IF OUTSTATION.</span>
                    <span style="display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">3. USAGE WITHIN SPECIFIED KM LIMIT.</span>
                    <span style="display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">4. SUBJECT TO LOCAL JURISDICTION ONLY.</span>
                </div>
                <div class="totals-box">
                    <div class="total-row"><span>PACKAGE BASE</span><span id="vPkgBase">₹ ${Math.round(inv.rate).toLocaleString('en-IN')}</span></div>
                    <div class="total-row"><span>SUNDAYS TOTAL x<span id="vSunCount">${inv.sundays}</span></span><span id="vSunTotalAmount">₹ ${Math.round(sunTotalAmount).toLocaleString('en-IN')}</span></div>
                    <div class="total-row highlight-total"><span>SUB TOTAL</span><span id="vSub">₹ ${Math.round(subTotalText).toLocaleString('en-IN')}</span></div>
                </div>
            </div>

            <div style="margin-top: 80px; display: flex; justify-content: space-between; align-items: flex-end;">
                <div style="font-size: 11px; color: #777; font-weight:bold;">SYSTEM GENERATED INVOICE</div>
                <div style="text-align: center; width: 250px;">
                    <span class="font-signature" style="font-size: 32px; color: #000; display: block; margin-bottom: 5px; text-transform:none;" id="vSignName">${profile.name || ''}</span>
                    <div style="border-top: 1.5px solid #000; padding-top: 5px;">
                        <small style="font-size: 10px; text-transform: uppercase; color: #555; font-weight: 700;">Authorized Signatory</small>
                    </div>
                </div>
            </div>
        </div>
        `;
    }

    function renderPage(tab) {
        const isLoaded = window.isProfileLoaded && window.isInvoicesLoaded;
        const invoices = window.appData.invoices;
        const profile = window.appData.profile;

        if (tab === 'dashboard') {
            if (!isLoaded) {
                return `
                <div class="grid grid-cols-2 gap-3 mb-6">
                    <div class="stat-card glass-card rounded-[5px] flex flex-col justify-center py-4 h-[88px]"><p class="font-bold text-slate-500 text-[11px] truncate">TOTAL INVOICES</p><div class="shimmer-box h-7 w-12 mt-1"></div></div>
                    <div class="stat-card glass-card rounded-[5px] flex flex-col justify-center py-4 h-[88px]"><p class="font-bold text-slate-500 text-[11px] truncate">TOTAL REVENUE</p><div class="shimmer-box h-7 w-24 mt-1"></div></div>
                </div>
                <div class="flex justify-between items-end mb-3 px-1"><h3 class="font-black text-sm text-slate-400 truncate">RECENT INVOICES</h3></div>
                <div class="space-y-3 pb-4">
                    <div class="glass-card p-4 rounded-[5px] flex justify-between items-center"><div class="flex-1"><div class="shimmer-box h-5 w-3/4 mb-2"></div><div class="shimmer-box h-3 w-1/2"></div></div><div class="shimmer-box h-6 w-20"></div></div>
                    <div class="glass-card p-4 rounded-[5px] flex justify-between items-center"><div class="flex-1"><div class="shimmer-box h-5 w-2/3 mb-2"></div><div class="shimmer-box h-3 w-1/3"></div></div><div class="shimmer-box h-6 w-20"></div></div>

            if (invoices.length === 0) {
                html += `
                <div class="flex-1 flex flex-col items-center justify-center pt-10 pb-12 animate-fade-in">
                    <div class="w-32 h-32 relative mb-8 mt-4">
                        <div class="absolute inset-0 bg-purple-200 dark:bg-purple-900/40 rounded-[5px] blur-2xl animate-pulse"></div>
                        <div class="relative bg-white dark:bg-slate-800 w-full h-full rounded-[5px] shadow-lg border border-slate-100 dark:border-slate-700 flex items-center justify-center animate-float">
                            <i data-lucide="folder-open" class="w-12 h-12 text-purple-400"></i>
                        </div>
                        <div class="absolute -bottom-2 -right-2 bg-emerald-100 dark:bg-emerald-900/50 w-12 h-12 rounded-[5px] border-[3px] border-[#f8fafc] dark:border-[#0f172a] flex items-center justify-center z-10 animate-float-delayed">
                            <i data-lucide="sparkles" class="w-5 h-5 text-emerald-500"></i>
                        </div>
                    </div>
                    <h3 class="font-black text-xl text-slate-800 dark:text-slate-100 mb-2 uppercase tracking-tight">No Invoices Yet</h3>
                    <p class="text-sm font-bold text-slate-400 text-center max-w-[250px] mb-8">Start your journey by creating your very first invoice right now.</p>
                    <button onclick="window.openNewInvoice()" class="px-6 py-3.5 bg-slate-900 dark:bg-white text-white dark:text-slate-900 font-black rounded-[5px] shadow-lg hover:scale-105 active:scale-95 transition-transform flex items-center gap-2">
                        <i data-lucide="plus" class="w-5 h-5"></i> Create Invoice
                    </button>
                </div>`;
            } else {
                html += `
                <div class="flex justify-between items-end mb-3 px-1"><h3 class="font-black text-sm text-slate-400 truncate">RECENT INVOICES</h3></div>
                <div class="space-y-3 pb-4">`;
                [...invoices].reverse().forEach(inv => {
                    // Extract only the first two words of the client name
                    const shortClient = inv.client ? inv.client.trim().split(/\s+/).slice(0, 2).join(' ') : 'CLIENT';
                    
                    html += `
                    <div onclick="viewInvoice('${inv.id}')" class="glass-card p-4 rounded-[5px] flex justify-between items-end gap-2 cursor-pointer hover:border-purple-400 transition-colors">
                        <div class="min-w-0 flex-1">

                            <h3 class="font-black text-base text-emerald-600 leading-none">${fmt(inv.subTotal)}</h3>
                        </div>
                    </div>`;
                });
                html += `</div>`;
            }
            return html;
        }

        if (tab === 'view-invoice') {
            if (!isLoaded || window.isInvoiceSimulatingLoad) {
                return `
                <div class="flex items-center justify-between mb-4 gap-2">
                    <div class="shimmer-box h-9 w-12 rounded-[5px]"></div>
                    <div class="shimmer-box h-9 w-32 rounded-[5px]"></div>
                </div>
                <div class="invoice-wrapper"><div class="shimmer-box w-[800px] h-[1131px] max-w-full rounded-[5px]"></div></div>`;
            }

            const inv = invoices.find(i => i.id === window.viewingInvoiceId);
            if(!inv) return `<div class="text-center p-10 font-bold text-red-500">Invoice Not Found.</div>`;

            return `
                <div class="animate-fade-in">
                    <div class="flex items-center justify-between mb-4 no-print gap-2">
                        <button onclick="switchTab('dashboard')" class="p-2 bg-slate-200 dark:bg-slate-800 text-slate-700 dark:text-slate-200 rounded-[5px] hover:bg-slate-300 transition-colors">
                            <i data-lucide="arrow-left" class="w-5 h-5"></i>
                        </button>
                        <div class="flex items-center gap-2">
                            <button onclick="editInvoice('${inv.id}')" class="p-2 bg-blue-100 text-blue-600 dark:bg-blue-900/30 dark:text-blue-400 rounded-[5px] hover:bg-blue-200 transition-colors" title="Edit Invoice">

                            </button>
                            <button onclick="deleteInvoice('${inv.id}')" class="p-2 bg-red-100 text-red-600 dark:bg-red-900/30 dark:text-red-400 rounded-[5px] hover:bg-red-200 transition-colors" title="Delete Invoice">

                            </button>

                                <i data-lucide="printer" class="w-5 h-5"></i>
                            </button>
                        </div>
                    </div>
                    <div class="invoice-wrapper">
                        ${generateInvoiceCardHTML(inv, profile)}
                    </div>
                </div>
            `;
        }

        if (tab === 'profile') {
            if (!isLoaded || window.isProfileSimulatingLoad) {
                 return `
                <div class="space-y-4">
                    <div class="glass-card rounded-[5px] p-6 text-center border border-slate-200 dark:border-slate-700 flex flex-col items-center"><div class="w-20 h-20 rounded-[5px] mb-3 shimmer-box"></div><div class="shimmer-box h-5 w-32 mb-2"></div><div class="shimmer-box h-3 w-40"></div></div>
                    <div class="glass-card rounded-[5px] p-4 border border-slate-200 dark:border-slate-700 space-y-4"><div class="shimmer-box h-4 w-32 mb-2"></div><div><div class="shimmer-box h-10 w-full mt-1.5"></div></div><div><div class="shimmer-box h-10 w-full mt-1.5"></div></div></div>
                </div>`;
            }

            const defaultAvatar = localStorage.getItem('cached_my_logo') || "my_logo.png";
            const avatarUrl = window.currentUser?.photoURL || defaultAvatar;

            const createdAt = profile.created_at || Date.now();
            const memDays = profile.membership_days || 365;
            const daysPassed = Math.floor((Date.now() - createdAt) / (1000 * 60 * 60 * 24));
            let daysLeft = memDays - daysPassed;
            if (daysLeft < 0) daysLeft = 0;
            const expiryDate = new Date(createdAt + memDays * 24 * 60 * 60 * 1000).toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' });

            return `
                <div class="space-y-4 animate-fade-in w-full">
                    <div class="glass-card rounded-[5px] p-6 text-center border border-slate-200 dark:border-slate-700 w-full">
                        <div class="w-20 h-20 mx-auto bg-purple-100 rounded-[5px] border-[3px] border-purple-500 overflow-hidden mb-3">
                            <img src="${avatarUrl}" class="w-full h-full object-contain">

                            <input type="text" id="p-name" value="${profile.name || ''}" oninput="window.saveProfile()" class="field-input mt-1.5 shadow-sm w-full">
                        </div>
                        <div class="w-full">
                            <label class="text-[11px] font-bold text-slate-500 uppercase ml-1">Phone Number</label>
                            <input type="text" id="p-phone" value="${profile.phone || ''}" oninput="window.saveProfile()" class="field-input mt-1.5 shadow-sm w-full">

                    <div class="glass-card rounded-[5px] p-4 text-center border border-slate-200 dark:border-slate-700 w-full">

                 return `

                        ${Array(12).fill('<div class="shimmer-box h-[68px] w-full rounded-[5px]"></div>').join('')}
                    </div>
                 </div>`;
            }

            let maxNum = 0;
            invoices.forEach(i => {
                const match = i.id.match(/INV-(\d+)/);
                if(match) {
                    const num = parseInt(match[1]);
                    if(num > maxNum) maxNum = num;
                }

            const nextId = 'INV-' + String(maxNum + 1).padStart(3, '0');

            return `
            <div class="flex flex-col w-full max-w-full pb-10">
                <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-6">
                    <div class="flex flex-col">
                        <label class="text-[10px] font-bold text-slate-500 uppercase mb-1 ml-1">Company / Bill To</label>
                        <input type="text" id="iBiz" value="SMS GROUP" oninput="runInvoiceCalculation()" class="field-input" placeholder="Client Company">

                    <div class="flex flex-col">
                        <label class="text-[10px] font-bold text-slate-500 uppercase mb-1 ml-1">Shift Selection</label>
                        <select id="iDesc" onchange="updateShiftDefaults(); runInvoiceCalculation()" class="field-input">
                            <option value="PACKAGE 45000 (B SHIFT)">B SHIFT</option>

                    <div class="flex flex-col">

                    <div class="flex flex-col">
                        <label class="text-[10px] font-bold text-slate-500 uppercase mb-1 ml-1">End Date</label>
                        <input type="date" id="iEndDate" value="${today()}" oninput="runInvoiceCalculation()" class="field-input">

                    <div class="flex flex-col">

                        <label class="text-[10px] font-bold text-slate-500 uppercase mb-1 ml-1">Veh. Number</label>

                    <div class="flex flex-col">
                        <label class="text-[10px] font-bold text-slate-500 uppercase mb-1 ml-1">Days worked</label>
                        <input type="number" id="iDays" value="26" oninput="runInvoiceCalculation()" class="field-input">
                    </div>
                    <div class="flex flex-col">
                        <label class="text-[10px] font-bold text-slate-500 uppercase mb-1 ml-1">Sundays</label>
                        <input type="number" id="iOff" value="4" oninput="runInvoiceCalculation()" class="field-input">
                    </div>
                    <div class="flex flex-col">
                        <label class="text-[10px] font-bold text-slate-500 uppercase mb-1 ml-1">Pkg Rate (₹)</label>
                        <input type="number" id="iRate" value="45000" oninput="runInvoiceCalculation()" class="field-input">
                    </div>
                    <div class="flex flex-col cursor-not-allowed opacity-60">
                        <label class="text-[10px] font-bold text-slate-500 uppercase mb-1 ml-1">Signature</label>
                        <input type="text" id="iSignName" value="${profile.name || ''}" disabled class="field-input">
                    </div>
                </div>

                <div class="flex gap-3">
                    <button id="save-btn" onclick="saveAndPrintInvoice()" class="flex-1 btn-primary bg-purple-600 text-white flex items-center justify-center hover:bg-purple-700 shadow-md transition-all tracking-wide">
                        ${window.isEditing ? 'UPDATE DATABASE' : 'SAVE TO DATABASE'}
                    </button>
                    <button onclick="window.openBottomSheet()" class="px-5 btn-primary bg-white dark:bg-slate-800 text-slate-700 dark:text-slate-200 flex items-center justify-center border border-slate-200 dark:border-slate-700 shadow-sm" title="Live Preview">
                        <i data-lucide="eye" class="w-5 h-5"></i>
                    </button>
                </div>
            </div>`;
        }

        return '';
    }

    window.saveProfile = () => {
        if (!window.currentUser) return;
        const p = { ...window.appData.profile, name: document.getElementById('p-name').value, phone: document.getElementById('p-phone').value };
        window.appData.profile = p;
        set(ref(database, `INVOYR/XRV BUSINESS LITE 1/users/${window.currentUser.uid}/profile`), p);
    }

    window.updateShiftDefaults = () => {
        const desc = document.getElementById('iDesc').value;
        const isBShift = desc.includes("B SHIFT");
        document.getElementById('iKm').value = isBShift ? 1280 : 2240;
        document.getElementById('iRate').value = isBShift ? 45000 : 55000;
    }

    window.runInvoiceCalculation = () => {
        if(!window.isProfileLoaded || !window.isInvoicesLoaded) return;

        if (window.isSaved) {
            window.isSaved = false;
            const btn = document.getElementById('save-btn');
            if (btn) {
                btn.innerHTML = window.isEditing ? 'UPDATE DATABASE' : 'SAVE TO DATABASE';
                btn.classList.remove('bg-emerald-600', 'pointer-events-none', 'opacity-90');
                btn.classList.add('bg-purple-600', 'hover:bg-purple-700');
                btn.disabled = false;
            }
        }

        const desc = document.getElementById('iDesc').value;
        const km = document.getElementById('iKm').value;
        const days = document.getElementById('iDays').value;
        const sundays = parseInt(document.getElementById('iOff').value) || 0;
        const rate = parseFloat(document.getElementById('iRate').value) || 0;
        const vName = document.getElementById('iVehName').value;
        const vNum = document.getElementById('iVehNum').value;
        const sDate = document.getElementById('iStartDate').value;
        const eDate = document.getElementById('iEndDate').value;
        let invNum = document.getElementById('iInvNum').value;

        if(!window.isEditing && (!invNum || invNum === '...')) {
             let maxNum = 0;
             window.appData.invoices.forEach(i => {
                const match = i.id.match(/INV-(\d+)/);
                if(match) {
                    const num = parseInt(match[1]);
                    if(num > maxNum) maxNum = num;
                }
             });
             invNum = 'INV-' + String(maxNum + 1).padStart(3, '0');
             document.getElementById('iInvNum').value = invNum;
        }

        const sunPrice = (desc.includes("B SHIFT")) ? 1730 : 2115;
        const sunTotal = sundays * sunPrice;
        const subTotal = rate + sunTotal;

        const liveInv = {
            id: invNum, startDate: sDate, endDate: eDate, client: document.getElementById('iBiz').value,
            shift: desc, vehName: vName, vehNum: vNum, km: km, days: days, sundays: sundays,
            rate: rate, subTotal: subTotal
        };

        const container = document.getElementById('bs-invoice-inner');
        if(container) {
            container.innerHTML = generateInvoiceCardHTML(liveInv, window.appData.profile);
        }
    }

    window.saveAndPrintInvoice = () => {
        if(!window.currentUser) return alert("You must be logged in to save.");

        const desc = document.getElementById('iDesc').value;
        const sundays = parseInt(document.getElementById('iOff').value) || 0;
        const rate = parseFloat(document.getElementById('iRate').value) || 0;
        const sunPrice = (desc.includes("B SHIFT")) ? 1730 : 2115;
        const invNum = document.getElementById('iInvNum').value;

        const invoiceData = {
            id: invNum,
            startDate: document.getElementById('iStartDate').value,
            endDate: document.getElementById('iEndDate').value,
            client: document.getElementById('iBiz').value,
            shift: desc,
            vehName: document.getElementById('iVehName').value,
            vehNum: document.getElementById('iVehNum').value,
            km: document.getElementById('iKm').value,
            days: document.getElementById('iDays').value,
            sundays: sundays,
            rate: rate,
            sunTotal: sundays * sunPrice,
            subTotal: rate + (sundays * sunPrice),
            createdAt: new Date().toISOString()
        };

        const isDuplicate = window.appData.invoices.some(inv =>
            inv.client === invoiceData.client &&
            inv.shift === invoiceData.shift &&
            inv.vehNum === invoiceData.vehNum &&
            inv.startDate === invoiceData.startDate &&
            inv.endDate === invoiceData.endDate &&
            inv.km == invoiceData.km &&
            inv.days == invoiceData.days &&
            inv.sundays == invoiceData.sundays &&
            inv.rate == invoiceData.rate &&
            inv.id !== invoiceData.id
        );

        if (isDuplicate) {
            alert("An invoice with these exact details already exists! Duplicates are not allowed.");
            return;
        }

        const markAsSaved = () => {
            window.isEditing = true;
            window.isSaved = true;
            const btn = document.getElementById('save-btn');
            if(btn) {
                btn.innerHTML = `GENERATED SUCCESSFULLY`;
                btn.classList.remove('bg-purple-600', 'hover:bg-purple-700');
                btn.classList.add('bg-emerald-600', 'pointer-events-none', 'opacity-90');
                btn.disabled = true;
            }
            window.fireRain();
        };

        set(ref(database, `INVOYR/XRV BUSINESS LITE 1/users/${window.currentUser.uid}/invoices/${invNum}`), invoiceData).then(() => {
            markAsSaved();
        }).catch((err) => {
            console.error("Save Error:", err);
            alert("Failed to save invoice.");
        });
    }
</script>
<script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('/sw.js')
                .then(reg => console.log('Service Worker registered!', reg))
                .catch(err => console.error('Service Worker registration failed: ', err));
        });
    }
</script>
</body>
</html>
