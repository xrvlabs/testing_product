<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LiteSpeed - XRV Elite v10</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Quantico:ital,wght@0,400;0,700;1,400;1,700&display=swap');

        :root {
            --bg: #050508;
            --card-bg: rgba(255, 255, 255, 0.04);
            --border: rgba(255, 255, 255, 0.15);
            --accent: #6366f1;
            --accent-hover: #818cf8;
            --accent-glow: rgba(99, 102, 241, 0.3);
            --accent-subtle: rgba(99, 102, 241, 0.08);
            --text: #ffffff;
            --text-dim: rgba(255, 255, 255, 0.4);
            --cursor-dot: #ffffff;
            --radius: 8px;
            --btn-text: #ffffff;
            --font: 'Quantico', sans-serif;
        }

        [data-theme="light"] {
            --bg: #f8fafc;
            --card-bg: rgba(0, 0, 0, 0.03);
            --border: rgba(0, 0, 0, 0.12);
            --accent: #4f46e5;
            --accent-hover: #6366f1;
            --accent-glow: rgba(79, 70, 229, 0.25);
            --accent-subtle: rgba(79, 70, 229, 0.06);
            --text: #0f172a;
            --text-dim: rgba(15, 23, 42, 0.5);
            --cursor-dot: #000000;
            --btn-text: #ffffff;
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            text-transform: uppercase;
        }

        *::-webkit-scrollbar { display: none; }
        * { scrollbar-width: none; -ms-overflow-style: none; }

        html, body { height: 100%; width: 100%; overflow: hidden; }

        body {
            background: var(--bg);
            display: flex;
            font-family: var(--font);
            cursor: none;
            color: var(--text);
            transition: background 0.4s ease, color 0.4s ease;
        }

        .cursor-element {
            position: fixed; top: 0; left: 0;
            pointer-events: none; will-change: transform;
            z-index: 9999; transition: none !important;
        }
        .cursor-glow {
            width: 600px; height: 600px;
            margin-left: -300px; margin-top: -300px;
            border-radius: 50%;
            background: radial-gradient(circle, var(--accent) 5%, transparent 60%);
            opacity: 0.12;
        }
        .cursor-dot {
            width: 6px; height: 6px;
            margin-left: -3px; margin-top: -3px;
            border-radius: 50%;
            background: var(--cursor-dot);
            mix-blend-mode: difference;
        }
        .cursor-ring {
            width: 30px; height: 30px;
            margin-left: -15px; margin-top: -15px;
            border-radius: 50%;
            border: 1px solid var(--text-dim);
        }

        #techCanvas { position: fixed; inset: 0; pointer-events: none; opacity: 0.1; filter: blur(2px); z-index: 0; }
        .grid-overlay {
            position: fixed; inset: 0;
            background-image: linear-gradient(var(--border) 1px, transparent 1px), linear-gradient(90deg, var(--border) 1px, transparent 1px);
            background-size: 50px 50px; opacity: 0.15; z-index: 0;
        }

        .wrap {
            position: relative; z-index: 10;
            width: 100%; height: 100%;
            display: flex; flex-direction: column;
            padding: clamp(12px, 3vw, 60px);
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: clamp(10px, 2vh, 30px);
            margin-bottom: clamp(10px, 2vh, 30px);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }
        .brand h1 {
            font-family: var(--font);
            font-size: clamp(1rem, 3.5vw, 1.8rem);
            font-weight: 700;
            letter-spacing: 0.4em;
        }

        .theme-btn {
            background: var(--card-bg);
            border: 1px solid var(--border);
            width: 40px; height: 40px;
            border-radius: 50%;
            color: var(--text);
            cursor: none;
            display: flex; align-items: center; justify-content: center;
            transition: border-color 0.3s, background 0.3s;
            position: relative; overflow: hidden; flex-shrink: 0;
        }
        .theme-btn:hover {
            border-color: var(--accent);
            background: var(--accent-subtle);
        }
        .theme-icon-sun, .theme-icon-moon {
            position: absolute; width: 18px; height: 18px;
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s ease;
        }
        [data-theme="dark"] .theme-icon-sun { opacity: 1; transform: rotate(0deg) scale(1); }
        [data-theme="dark"] .theme-icon-moon { opacity: 0; transform: rotate(90deg) scale(0.5); }
        [data-theme="light"] .theme-icon-sun { opacity: 0; transform: rotate(-90deg) scale(0.5); }
        [data-theme="light"] .theme-icon-moon { opacity: 1; transform: rotate(0deg) scale(1); }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100%;
            min-height: 0;
        }

        .container {
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            gap: clamp(8px, 1.5vh, 18px);
        }

        .meta-grid { display: grid; grid-template-columns: 1fr 1fr; gap: clamp(8px, 1.5vh, 15px); }
        .meta-item {
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: clamp(10px, 2vh, 18px);
            border-radius: var(--radius);
            backdrop-filter: blur(15px);
            transition: border-color 0.4s, background 0.4s;
        }
        .meta-label {
            font-family: var(--font);
            font-size: clamp(0.5rem, 1.5vw, 0.65rem);
            color: var(--text-dim);
            letter-spacing: 2px;
            margin-bottom: 4px;
        }
        .meta-value {
            font-family: var(--font);
            font-size: clamp(0.7rem, 2vw, 0.9rem);
            font-weight: 700;
        }

        .speed-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: clamp(30px, 6vh, 100px) 20px;
            position: relative; overflow: hidden;
            text-align: center;
            transition: border-color 0.4s, background 0.4s;
        }
        .speed-card::before {
            content: ""; position: absolute; inset: -150%;
            background: conic-gradient(from 0deg, transparent 40%, var(--accent) 50%, transparent 60%);
            animation: rotate 2s linear infinite; display: none;
        }
        .speed-card::after {
            content: ""; position: absolute; inset: 2px;
            background: var(--bg); border-radius: 6px; z-index: 1;
            transition: background 0.4s;
        }
        .speed-card.is-testing::before { display: block; }
        .speed-content { position: relative; z-index: 2; }

        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .speed-val {
            font-family: var(--font);
            font-size: clamp(3.5rem, 12vw, 9rem);
            font-weight: 700;
            line-height: 0.9;
        }
        .speed-unit {
            font-family: var(--font);
            font-size: clamp(0.7rem, 2vw, 1rem);
            letter-spacing: 0.5em;
            color: var(--text-dim);
            margin-top: clamp(8px, 2vh, 20px);
        }

        .metrics-row { display: flex; gap: clamp(6px, 1.2vw, 12px); width: 100%; }
        .m-card {
            flex: 1;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: clamp(12px, 2vh, 20px) 5px;
            text-align: center;
            min-width: 0;
            backdrop-filter: blur(10px);
            transition: border-color 0.4s, background 0.4s;
        }
        .m-label {
            font-family: var(--font);
            font-size: clamp(0.5rem, 1.3vw, 0.6rem);
            color: var(--text-dim);
            margin-bottom: clamp(4px, 1vh, 8px);
            letter-spacing: 2px;
        }
        .m-value {
            font-family: var(--font);
            font-size: clamp(0.9rem, 2.5vw, 1.5rem);
            font-weight: 700;
            display: inline-block;
            transition: transform 0.1s ease, opacity 0.1s ease;
        }

        /* JITTER shake animation */
        .m-value.jitter-active {
            animation: jitterShake 0.12s infinite alternate;
        }
        @keyframes jitterShake {
            0% { transform: translate(0, 0) rotate(0deg); }
            20% { transform: translate(-1.5px, 0.8px) rotate(-0.5deg); }
            40% { transform: translate(1.2px, -0.6px) rotate(0.4deg); }
            60% { transform: translate(-0.8px, 1.2px) rotate(-0.3deg); }
            80% { transform: translate(1px, -1px) rotate(0.5deg); }
            100% { transform: translate(-0.5px, 0.5px) rotate(-0.2deg); }
        }

        /* LATENCY pulse/breathe animation - door paas effect */
        .m-value.latency-active {
            animation: latencyPulse 1.2s ease-in-out infinite;
        }
        @keyframes latencyPulse {
            0% { transform: scale(1) translateZ(0); opacity: 1; filter: blur(0px); }
            25% { transform: scale(0.82) translateZ(0); opacity: 0.5; filter: blur(1.5px); }
            50% { transform: scale(1.12) translateZ(0); opacity: 1; filter: blur(0px); }
            75% { transform: scale(0.88) translateZ(0); opacity: 0.55; filter: blur(1px); }
            100% { transform: scale(1) translateZ(0); opacity: 1; filter: blur(0px); }
        }

        /* Settle animation when scan completes */
        .m-value.settle {
            animation: settleDown 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }
        @keyframes settleDown {
            0% { transform: scale(1.1); opacity: 0.7; }
            50% { transform: scale(0.95); opacity: 0.9; }
            100% { transform: scale(1); opacity: 1; filter: blur(0); }
        }

        .btn {
            width: 100%;
            padding: clamp(14px, 2.5vh, 22px) 30px;
            background: var(--accent);
            border: 1px solid var(--accent);
            color: var(--btn-text);
            font-family: var(--font);
            font-size: clamp(0.7rem, 2vw, 0.85rem);
            font-weight: 700;
            letter-spacing: 0.4em;
            border-radius: var(--radius);
            cursor: none;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 25px var(--accent-glow), 0 4px 15px rgba(0,0,0,0.2);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn::before {
            content: '';
            position: absolute; inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, transparent 50%, rgba(255,255,255,0.05) 100%);
            pointer-events: none;
        }
        .btn:hover:not(:disabled) {
            background: var(--accent-hover);
            border-color: var(--accent-hover);
            box-shadow: 0 0 40px var(--accent-glow), 0 6px 25px rgba(0,0,0,0.3);
            transform: translateY(-2px);
        }
        .btn:active:not(:disabled) {
            transform: translateY(0px) scale(0.985);
            box-shadow: 0 0 15px var(--accent-glow), 0 2px 8px rgba(0,0,0,0.2);
        }
        .btn:disabled { opacity: 0.5; box-shadow: none; }

        .btn.scanning { animation: btnPulse 1.5s ease-in-out infinite; }
        @keyframes btnPulse {
            0%, 100% { box-shadow: 0 0 25px var(--accent-glow), 0 4px 15px rgba(0,0,0,0.2); }
            50% { box-shadow: 0 0 45px var(--accent-glow), 0 4px 20px rgba(0,0,0,0.3); }
        }

        .btn-content {
            position: relative; z-index: 2;
            display: flex; align-items: center;
            justify-content: center; gap: 12px;
        }

        .spinner {
            display: none;
            width: 18px; height: 18px;
            border: 2.5px solid rgba(255,255,255,0.3);
            border-top-color: #ffffff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }
        .btn.scanning .spinner { display: block; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .footer {
            padding-top: clamp(8px, 2vh, 30px);
            font-family: var(--font);
            font-size: clamp(7px, 1.2vw, 10px);
            letter-spacing: 0.3em;
            color: var(--text-dim);
            text-align: center;
            flex-shrink: 0;
        }

        @media (max-height: 500px) {
            .speed-card { padding: 20px 15px; }
            .speed-val { font-size: clamp(2.5rem, 10vw, 4rem); }
            .header { padding-bottom: 8px; margin-bottom: 8px; }
            .container { gap: 6px; }
            .meta-item { padding: 8px 10px; }
            .m-card { padding: 8px 4px; }
            .btn { padding: 10px 20px; }
            .footer { padding-top: 6px; }
        }

        @media (max-height: 650px) and (min-height: 501px) {
            .speed-card { padding: 25px 15px; }
            .speed-val { font-size: clamp(3rem, 10vw, 5rem); }
            .container { gap: 8px; }
        }
    </style>
</head>
<body>

    <div class="cursor-element cursor-glow" id="glow"></div>
    <div class="cursor-element cursor-ring" id="ring"></div>
    <div class="cursor-element cursor-dot" id="dot"></div>

    <div class="grid-overlay"></div>
    <canvas id="techCanvas"></canvas>

    <div class="wrap">
        <header class="header">
            <div class="brand"><h1>LiteSpeed</h1></div>
            <button class="theme-btn" onclick="toggleTheme()" id="themeBtn" aria-label="Toggle theme">
                <svg class="theme-icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="5"></circle>
                    <line x1="12" y1="1" x2="12" y2="3"></line>
                    <line x1="12" y1="21" x2="12" y2="23"></line>
                    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                    <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                    <line x1="1" y1="12" x2="3" y2="12"></line>
                    <line x1="21" y1="12" x2="23" y2="12"></line>
                    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                    <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                </svg>
                <svg class="theme-icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                </svg>
            </button>
        </header>

        <main class="main-content">
            <div class="container">
                <div class="meta-grid">
                    <div class="meta-item">
                        <div class="meta-label">ISP Network</div>
                        <div class="meta-value" id="vIsp">Fetching...</div>
                    </div>
                    <div class="meta-item">
                        <div class="meta-label">Node Access</div>
                        <div class="meta-value" id="vIp">0.0.0.0</div>
                    </div>
                </div>

                <div class="speed-card" id="speedCard">
                    <div class="speed-content">
                        <div class="speed-val" id="vDown">0.0</div>
                        <div class="speed-unit">Mbps</div>
                    </div>
                </div>

                <div class="metrics-row">
                    <div class="m-card">
                        <div class="m-label">Latency</div>
                        <div class="m-value" id="vPing">0MS</div>
                    </div>
                    <div class="m-card">
                        <div class="m-label">Jitter</div>
                        <div class="m-value" id="vJitter">0MS</div>
                    </div>
                    <div class="m-card">
                        <div class="m-label">Load</div>
                        <div class="m-value" id="vData">0MB</div>
                    </div>
                </div>

                <button class="btn" id="startBtn" onclick="runTest()">
                    <span class="btn-content">
                        <span class="spinner" id="btnSpinner"></span>
                        <span id="btnText">Initiate Scan</span>
                    </span>
                </button>
            </div>
        </main>

        <footer class="footer">XRV Labs // Diagnostic Terminal 10.0 // © 2026</footer>
    </div>

    <script>
        function toggleTheme() {
            const html = document.documentElement;
            const isDark = html.getAttribute('data-theme') === 'dark';
            html.setAttribute('data-theme', isDark ? 'light' : 'dark');
        }

        let mX = window.innerWidth / 2, mY = window.innerHeight / 2;
        const dotEl = document.getElementById('dot');
        const ringEl = document.getElementById('ring');
        const glowEl = document.getElementById('glow');

        document.addEventListener('mousemove', (e) => { mX = e.clientX; mY = e.clientY; });

        function animateCursor() {
            const t = `translate3d(${mX}px,${mY}px,0)`;
            dotEl.style.transform = t;
            ringEl.style.transform = t;
            glowEl.style.transform = t;
            requestAnimationFrame(animateCursor);
        }
        requestAnimationFrame(animateCursor);

        const tCanvas = document.getElementById('techCanvas');
        const tCtx = tCanvas.getContext('2d');
        let cols = [];
        function initTech() {
            tCanvas.width = window.innerWidth; tCanvas.height = window.innerHeight;
            cols = Array(Math.floor(tCanvas.width / 20)).fill(0);
        }
        function drawTech() {
            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            tCtx.fillStyle = isDark ? "rgba(5,5,8,0.15)" : "rgba(248,250,252,0.15)";
            tCtx.fillRect(0, 0, tCanvas.width, tCanvas.height);
            tCtx.fillStyle = isDark ? "#6366f1" : "#4f46e5";
            tCtx.font = "11px 'Quantico',monospace";
            cols.forEach((y, i) => {
                tCtx.fillText(Math.random() > 0.5 ? "0" : "1", i * 20, y);
                if (y > 100 + Math.random() * 8000) cols[i] = 0; else cols[i] = y + 20;
            });
        }
        window.addEventListener('resize', initTech);
        initTech(); setInterval(drawTech, 70);

        const CFG = { endpoint: 'https://speed.cloudflare.com/__down', duration: 8000 };
        let S = { running: false, totalData: 0, smoothed: 0 };
        let abortCtrl = null;
        let jitterAnimFrame = null;

        async function fetchMeta() {
            try {
                const res = await fetch('https://speed.cloudflare.com/meta', { cache: 'no-store' });
                const data = await res.json();
                document.getElementById('vIsp').textContent = (data.asOrganization || 'UNKNOWN').split(' ')[0].toUpperCase();
                document.getElementById('vIp').textContent = data.clientIp;
            } catch (e) {}
        }
        fetchMeta();

        // Jitter random value flicker during scan
        function startJitterFlicker() {
            const el = document.getElementById('vJitter');
            el.classList.add('jitter-active');
            
            function flicker() {
                if (!S.running) return;
                // Random micro-offset to text for extra glitchy feel
                const rx = (Math.random() - 0.5) * 2;
                const ry = (Math.random() - 0.5) * 2;
                el.style.textShadow = `${rx}px ${ry}px 2px var(--accent-glow)`;
                jitterAnimFrame = requestAnimationFrame(flicker);
            }
            flicker();
        }

        function stopJitterFlicker() {
            const el = document.getElementById('vJitter');
            el.classList.remove('jitter-active');
            el.classList.add('settle');
            el.style.textShadow = 'none';
            if (jitterAnimFrame) cancelAnimationFrame(jitterAnimFrame);
            setTimeout(() => el.classList.remove('settle'), 600);
        }

        // Latency depth animation
        function startLatencyPulse() {
            const el = document.getElementById('vPing');
            el.classList.add('latency-active');
        }

        function stopLatencyPulse() {
            const el = document.getElementById('vPing');
            el.classList.remove('latency-active');
            el.classList.add('settle');
            setTimeout(() => el.classList.remove('settle'), 600);
        }

        async function runTest() {
            if (S.running) return;
            S.running = true;
            if (abortCtrl) abortCtrl.abort();
            abortCtrl = new AbortController();
            const btn = document.getElementById('startBtn');
            const btnText = document.getElementById('btnText');
            const card = document.getElementById('speedCard');

            btn.disabled = true;
            btnText.textContent = 'Scanning';
            btn.classList.add('scanning');
            card.classList.add('is-testing');
            S.totalData = 0; S.smoothed = 0;

            // Start metric animations
            startJitterFlicker();
            startLatencyPulse();

            try {
                let pings = [];
                for (let i = 0; i < 8; i++) {
                    const t = performance.now();
                    await fetch('https://speed.cloudflare.com/cdn-cgi/trace', { mode: 'no-cors', cache: 'no-store', signal: abortCtrl.signal });
                    if (i > 0) pings.push(performance.now() - t);
                    await new Promise(r => setTimeout(r, 40));
                }
                document.getElementById('vPing').textContent = Math.round(Math.min(...pings)) + 'MS';
                let jSum = 0; for (let i = 1; i < pings.length; i++) jSum += Math.abs(pings[i] - pings[i - 1]);
                document.getElementById('vJitter').textContent = (jSum / (pings.length - 1)).toFixed(1) + 'MS';

                await startDownload(abortCtrl.signal);

                // Stop metric animations with settle
                stopJitterFlicker();
                stopLatencyPulse();

                btnText.textContent = 'Scan Complete';
                btn.classList.remove('scanning');

                setTimeout(() => {
                    if (!S.running) {
                        btnText.textContent = 'Restart Scan';
                    }
                }, 2000);
            } catch (e) {
                btnText.textContent = 'Error';
                btn.classList.remove('scanning');
                stopJitterFlicker();
                stopLatencyPulse();
            }
            finally { btn.disabled = false; card.classList.remove('is-testing'); S.running = false; }
        }

        async function startDownload(signal) {
            const start = performance.now();
            const download = async () => {
                try {
                    const resp = await fetch(CFG.endpoint + '?bytes=50000000', { cache: 'no-store', signal });
                    const reader = resp.body.getReader();
                    while (true) {
                        const { done, value } = await reader.read();
                        const elapsed = (performance.now() - start) / 1000;
                        if (done || elapsed > (CFG.duration / 1000)) { reader.cancel(); break; }
                        S.totalData += value.length;
                        const mbps = (S.totalData * 8 / 1048576) / elapsed;
                        if (elapsed > 0.2) {
                            S.smoothed = S.smoothed === 0 ? mbps : (mbps * 0.8) + (S.smoothed * 0.2);
                            document.getElementById('vDown').textContent = S.smoothed.toFixed(1);
                            document.getElementById('vData').textContent = (S.totalData / 1048576).toFixed(1) + 'MB';
                        }
                    }
                } catch (e) {}
            };
            for (let i = 0; i < 3; i++) download();
            await new Promise(r => setTimeout(r, CFG.duration));
        }
    </script>
</body>
</html>
